<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fehlersuche: Präposition ПОД</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f4f7f6;
            color: var(--primary);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 10px;
            font-size: 1.6rem;
        }

        .intro-box {
            background-color: #e8f4fd;
            padding: 15px;
            border-left: 5px solid var(--secondary);
            margin-bottom: 25px;
            border-radius: 5px;
            font-size: 0.95rem;
        }

        /* Error Card */
        .error-card {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .sentence-display {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .choice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .btn-choice {
            padding: 10px 25px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            flex: 1;
            max-width: 150px;
        }

        .btn-choice:hover { border-color: var(--secondary); background: #f0f8ff; }

        /* Feedback Colors */
        .error-card.correct { border-color: var(--success); background-color: #f0fff4; }
        .error-card.incorrect { border-color: var(--danger); background-color: #fff5f5; }

        .btn-choice.selected-correct { background-color: var(--success); color: white; border-color: #1e8449; }
        .btn-choice.selected-incorrect { background-color: var(--danger); color: white; border-color: #c0392b; }

        .explanation {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            color: #555;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button.action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 0.8rem;
        }

        .btn-reset { background-color: #e67e22; }
        .btn-solution { background-color: var(--secondary); }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .sentence-display { font-size: 1.1rem; }
            .btn-choice { padding: 10px 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fehlersuche: Präposition ПОД</h1>
    
    <div class="intro-box">
        <p>Einige der folgenden Sätze enthalten Fehler bei der Verwendung der Präposition <strong>ПОД</strong> (falscher Fall oder falscher Ausdruck). Klicke auf „Richtig“ oder „Falsch“.</p>
    </div>

    <div id="exercise-container">
        <!-- JS generiert die Aufgaben -->
    </div>
</div>

<script>
    const data = [
        {
            sentence: "Под вечер я всегда устаю.",
            isCorrect: true,
            explanation: "Richtig! Bei Zeitangaben folgt auf 'под' der Akkusativ (вечер)."
        },
        {
            sentence: "Мы купили подарки под Новым годом.",
            isCorrect: false,
            explanation: "Falsch! Bei Zeitangaben muss Akkusativ stehen: 'под Новый год'."
        },
        {
            sentence: "Он сейчас немного под градусом.",
            isCorrect: true,
            explanation: "Richtig! Der idiomatische Zustand erfordert den Instrumentalis (градусом)."
        },
        {
            sentence: "Кто-то украл кольцо под шумок.",
            isCorrect: true,
            explanation: "Richtig! 'Под шумок' (Akkusativ) ist ein feststehender Ausdruck für 'heimlich'."
        },
        {
            sentence: "Ты попал шефу под горячей рукой.",
            isCorrect: false,
            explanation: "Falsch! Es ist eine Richtung/ein Ziel: 'под горячую руку' (Akkusativ)."
        },
        {
            sentence: "Погода под стать моему настроению.",
            isCorrect: true,
            explanation: "Richtig! 'Под стать' ist eine unveränderliche Wendung für 'passend'."
        },
        {
            sentence: "Он поставил проект под ударом.",
            isCorrect: false,
            explanation: "Falsch! Es muss Akkusativ sein: 'поставить под удар'."
        },
        {
            sentence: "Под вечером стало очень холодно.",
            isCorrect: false,
            explanation: "Falsch! Zeitliche Annäherung immer mit Akkusativ: 'под вечер'."
        },
        {
            sentence: "Она находится под защитой закона.",
            isCorrect: true,
            explanation: "Richtig! Hier wird der Ort/Zustand 'unter dem Schutz' mit Instrumentalis ausgedrückt."
        },
        {
            sentence: "Под конец урока все начали спрашивать.",
            isCorrect: true,
            explanation: "Richtig! 'Под конец' steht im Akkusativ."
        }
    ];

    let userChoices = data.map(() => null);

    function render() {
        const container = document.getElementById('exercise-container');
        container.innerHTML = '';

        data.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'error-card';
            
            const choice = userChoices[idx];
            if (choice !== null) {
                card.className += (choice === item.isCorrect) ? ' correct' : ' incorrect';
            }

            card.innerHTML = `
                <span class="sentence-display">${item.sentence}</span>
                <div class="choice-container">
                    <button class="btn-choice ${choice === true ? (item.isCorrect ? 'selected-correct' : 'selected-incorrect') : ''}" 
                            onclick="select(${idx}, true)">Richtig</button>
                    <button class="btn-choice ${choice === false ? (!item.isCorrect ? 'selected-correct' : 'selected-incorrect') : ''}" 
                            onclick="select(${idx}, false)">Falsch</button>
                </div>
                <div class="explanation" id="exp-${idx}">${item.explanation}</div>
                <div class="controls">
                    <button class="action-btn btn-reset" onclick="reset(${idx})">Reset</button>
                    <button class="action-btn btn-solution" onclick="solve(${idx})">Lösung</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.select = (idx, choice) => {
        userChoices[idx] = choice;
        render();
        document.getElementById(`exp-${idx}`).style.display = 'block';
    };

    window.reset = (idx) => {
        userChoices[idx] = null;
        render();
    };

    window.solve = (idx) => {
        userChoices[idx] = data[idx].isCorrect;
        render();
        document.getElementById(`exp-${idx}`).style.display = 'block';
    };

    render();
</script>

</body>
</html>
