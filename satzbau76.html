<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satzbau-Profi: 10 Sätze mit ПОД</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: var(--primary);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 10px;
            font-size: 1.5rem;
        }

        .intro-box {
            background-color: #eef7ff;
            padding: 15px;
            border-left: 5px solid var(--secondary);
            margin-bottom: 25px;
            border-radius: 5px;
            font-size: 0.95rem;
        }

        .exercise-card {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .exercise-card.is-correct {
            border-color: var(--success);
            background-color: #f0fff4;
        }

        .translation-hint {
            color: #555;
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        /* Satzbau-Bereich */
        .target-area {
            border: 2px dashed #bbb;
            background-color: #fafafa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 50px;
            align-items: center;
        }

        /* Wort-Pool */
        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .word-btn {
            background: var(--white);
            border: 1px solid var(--secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            user-select: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .word-btn:hover {
            background-color: var(--secondary);
            color: white;
        }

        .word-btn.in-sentence {
            background-color: #e8f4fd;
            border-style: solid;
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 10px;
        }

        button.action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 0.85rem;
        }

        .btn-reset { background-color: #e67e22; }
        .btn-solution { background-color: var(--secondary); }
        
        .feedback-text {
            margin-left: auto;
            font-weight: bold;
            color: var(--success);
            display: none;
        }

        .is-correct .feedback-text { display: block; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .controls { flex-direction: column; }
            button.action-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Satzbau-Baukasten: ПОД</h1>
    
    <div class="intro-box">
        <p>Bilde die russischen Sätze passend zur Übersetzung. Klicke die Wörter an, um sie hinzuzufügen oder zu entfernen. Keine Tastatur nötig!</p>
    </div>

    <div id="exercise-list">
        <!-- Inhalte werden per JS generiert -->
    </div>
</div>

<script>
    const sentences = [
        {
            german: "Ich kaufe Geschenke kurz vor Neujahr.",
            correct: ["Я", "покупаю", "подарки", "под", "Новый", "год"]
        },
        {
            german: "Er ist ein bisschen angetrunken.",
            correct: ["Он", "немного", "под", "градусом"]
        },
        {
            german: "Gegen Abend werde ich immer müde.",
            correct: ["Под", "вечер", "я", "всегда", "устаю"]
        },
        {
            german: "Die Braut passt zum Bräutigam.",
            correct: ["Невеста", "под", "стать", "жениху"]
        },
        {
            german: "Gegen Ende der Stunde stellten sie Fragen.",
            correct: ["Под", "конец", "урока", "они", "задавали", "вопросы"]
        },
        {
            german: "Er ist heimlich nach Hause gegangen.",
            correct: ["Он", "ушёл", "домой", "под", "шумок"]
        },
        {
            german: "Du bist dem Chef in die Schusslinie geraten.",
            correct: ["Ты", "попался", "шефу", "под", "горячую", "руку"]
        },
        {
            german: "Du hast unser Projekt gefährdet.",
            correct: ["Ты", "поставил", "наш", "проект", "под", "удар"]
        },
        {
            german: "Die Kinder spielen unter Aufsicht.",
            correct: ["Дети", "играют", "под", "присмотром"]
        },
        {
            german: "Wir stehen unter dem Schutz des Gesetzes.",
            correct: ["Мы", "находимся", "под", "защитой", "закона"]
        }
    ];

    // Zustand der Übungen
    let states = sentences.map(s => ({
        selected: [],
        pool: shuffle([...s.correct])
    }));

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function render() {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';

        sentences.forEach((s, idx) => {
            const isCorrect = states[idx].selected.join(' ') === s.correct.join(' ');
            
            const card = document.createElement('div');
            card.className = `exercise-card ${isCorrect ? 'is-correct' : ''}`;
            
            card.innerHTML = `
                <span class="translation-hint">„${s.german}“</span>
                
                <div class="target-area">
                    ${states[idx].selected.map((word, wIdx) => `
                        <button class="word-btn in-sentence" onclick="removeFromSentence(${idx}, ${wIdx})">${word}</button>
                    `).join('')}
                </div>

                <div class="word-pool">
                    ${states[idx].pool.map((word, pIdx) => `
                        <button class="word-btn" onclick="addToSentence(${idx}, ${pIdx})">${word}</button>
                    `).join('')}
                </div>

                <div class="controls">
                    <button class="action-btn btn-reset" onclick="resetSentence(${idx})">Zurücksetzen</button>
                    <button class="action-btn btn-solution" onclick="showSolution(${idx})">Lösung</button>
                    <span class="feedback-text">✓ Korrekt!</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.addToSentence = (sIdx, pIdx) => {
        const word = states[sIdx].pool.splice(pIdx, 1)[0];
        states[sIdx].selected.push(word);
        render();
    };

    window.removeFromSentence = (sIdx, wIdx) => {
        const word = states[sIdx].selected.splice(wIdx, 1)[0];
        states[sIdx].pool.push(word);
        render();
    };

    window.resetSentence = (idx) => {
        states[idx].selected = [];
        states[idx].pool = shuffle([...sentences[idx].correct]);
        render();
    };

    window.showSolution = (idx) => {
        states[idx].selected = [...sentences[idx].correct];
        states[idx].pool = [];
        render();
    };

    // Initialer Start
    render();
</script>

</body>
</html>
