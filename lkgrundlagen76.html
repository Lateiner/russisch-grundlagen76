<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Trainer: Präposition ПОД</title>
    <style>
        :root {
            --primary-green: #27ae60;
            --secondary-green: #2ecc71;
            --dark-green: #1e8449;
            --light-bg: #f1f8f4;
            --card-white: #ffffff;
            --text-color: #2c3e50;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .progress {
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard Styles */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 20px;
            background: var(--card-white);
            border: 4px solid var(--primary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f9fff9;
        }

        .side-label {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }

        .content {
            font-size: 2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        /* Controls */
        .main-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .action-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: #95a5a6;
        }

        button.secondary:hover {
            background-color: #7f8c8d;
        }

        .instructions {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #7f8c8d;
            line-height: 1.5;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .flashcard-container { height: 250px; }
            .content { font-size: 1.5rem; }
            h1 { font-size: 1.4rem; }
            button { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Die Präposition ПОД</h1>
    <div class="progress" id="progress">1 / 30</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="side-label">Russisch</span>
                <div class="content" id="front-text">Vorderseite</div>
            </div>
            <div class="card-face card-back">
                <span class="side-label">Deutsch</span>
                <div class="content" id="back-text">Rückseite</div>
            </div>
        </div>
    </div>

    <div class="main-controls">
        <button onclick="prevCard()">← Vorherige</button>
        <button onclick="nextCard()">Nächste →</button>
    </div>

    <div class="action-controls">
        <button class="secondary" onclick="shuffleCards()">Mischen</button>
        <button class="secondary" onclick="goToStart()">An den Anfang</button>
    </div>

    <div class="instructions">
        Tastatur: ← → zum Navigieren | Leertaste/Enter zum Umdrehen | Pos1 für Anfang
    </div>
</div>

<script>
    // Vokabelliste
    const initialData = [
        { ru: "под ве́чер", de: "gegen Abend" },
        { ru: "под Но́вый год", de: "kurz vor Neujahr" },
        { ru: "под коне́ц уро́ка", de: "gegen Ende der Stunde" },
        { ru: "под гра́дусом", de: "angetrunken / einen Schwips haben" },
        { ru: "под шумо́к", de: "im Trubel / heimlich / unbemerkt" },
        { ru: "попа́сть под горя́чую ру́ку", de: "in die Schusslinie geraten" },
        { ru: "под ста́ть", de: "passend / ebenbürtig" },
        { ru: "поста́вить под уда́р", de: "gefährden / aufs Spiel setzen" },
        { ru: "под присмо́тром", de: "unter Aufsicht" },
        { ru: "под защи́той", de: "unter Schutz" },
        { ru: "устава́ть / уста́ть", de: "müde werden" },
        { ru: "покупа́ть / купи́ть", de: "kaufen" },
        { ru: "задава́ть / зада́ть", de: "(Fragen) stellen" },
        { ru: "уходи́ть / уйти́", de: "weggehen / fortgehen" },
        { ru: "попада́ться / попа́сться", de: "geraten / hineingeraten" },
        { ru: "ста́вить / поста́вить", de: "stellen / setzen" },
        { ru: "находи́ться / найти́сь", de: "sich befinden / sich finden" },
        { ru: "кра́сть / укра́сть", de: "stehlen" },
        { ru: "под столо́м", de: "unter dem Tisch" },
        { ru: "под крова́тью", de: "unter dem Bett" },
        { ru: "под де́ревом", de: "unter dem Baum" },
        { ru: "пого́да", de: "Wetter" },
        { ru: "настрое́ние", de: "Stimmung" },
        { ru: "неве́ста", de: "Braut" },
        { ru: "жени́х", de: "Bräutigam" },
        { ru: "пода́рок", de: "Geschenk" },
        { ru: "оши́бка", de: "Fehler" },
        { ru: "прое́кт", de: "Projekt" },
        { ru: "компа́ния", de: "Firma / Unternehmen" },
        { ru: "зако́н", de: "Gesetz" }
    ];

    let cards = [...initialData];
    let currentIndex = 0;

    const cardElement = document.getElementById('card');
    const frontText = document.getElementById('front-text');
    const backText = document.getElementById('back-text');
    const progressText = document.getElementById('progress');

    // Karte initialisieren
    function updateCard() {
        // Umdrehen zurücksetzen
        cardElement.classList.remove('is-flipped');
        
        setTimeout(() => {
            const current = cards[currentIndex];
            frontText.textContent = current.ru;
            backText.textContent = current.de;
            progressText.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            // Schriftgröße anpassen
            adjustFontSize(frontText);
            adjustFontSize(backText);
        }, cardElement.classList.contains('is-flipped') ? 300 : 0);
    }

    function adjustFontSize(element) {
        const length = element.textContent.length;
        if (length > 30) {
            element.style.fontSize = '1.2rem';
        } else if (length > 20) {
            element.style.fontSize = '1.5rem';
        } else {
            element.style.fontSize = '2rem';
        }
    }

    function flipCard() {
        cardElement.classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCard();
        } else {
            // Optional: Zum Anfang springen
            currentIndex = 0;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goToStart() {
        currentIndex = 0;
        updateCard();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowRight':
                nextCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case ' ':
            case 'Enter':
                e.preventDefault(); // Verhindert Scrollen bei Leertaste
                flipCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });

    // Initialisierung
    updateCard();
</script>

</body>
</html>
